<body>

    <button class="toggle-btn" id="themeToggle">
        🌙 Toggle Theme
    </button>

    <div class="container">

        <h1>🌾 AgroCast AI</h1>

        <p class="subtitle">
            AI-Powered Humidity Forecasting Platform
        </p>

        <div class="search-box">

            <input
                type="text"
                id="cityInput"
                placeholder="Enter city name"
            >

            <button id="weatherBtn">
                Get Weather
            </button>

            <button id="forecastBtn">
                Generate Forecast
            </button>

            <button id="downloadBtn">
                Download CSV
            </button>

        </div>

        <div class="card">
            <div id="weatherInfo"></div>
        </div>

        <div class="card">
            <canvas id="forecastChart"></canvas>
        </div>

        <div class="card">
            <div id="insights"></div>
        </div>

        <div class="footer">
            Built with ❤️ using AI & Time Series Forecasting
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>

</body>
